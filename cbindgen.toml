language = "C"
include_guard = "KYUN2STOP_FFI_H"
pragma_once = false
cpp_compat = true

include_version = false
autogen_warning = "/* This file is generated by cbindgen. Manual edits may be overwritten. */"

includes = ["stdbool.h", "stddef.h", "stdint.h"]

header = "#ifdef _WIN32\n  #ifdef K2S_BUILD_DLL\n    #define K2S_API __declspec(dllexport)\n  #else\n    #define K2S_API __declspec(dllimport)\n  #endif\n#else\n  #define K2S_API\n#endif"

after_includes = ""

[parse]
parse_deps = false
expand = ["Kyun2Stop"]

[export]
include = [
  "K2sConfig",
  "K2sCurve",
  "K2sSyncBeat",
  "K2sProcessParams",
  "K2sOpaqueHandle",
  "k2s_create",
  "k2s_destroy",
  "k2s_reset",
  "k2s_process_interleaved_f32",
]

[fn]
prefix = "K2S_API "

[enum]
prefix_with_name = false

